name: Deploy to Cloudflare Pages

# Production deploy on merge to main; preview URL on every PR (03-TRD §5).
# Requires the CLOUDFLARE_API_TOKEN org secret (see REMAINING-MANUAL-STEPS.md).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy (main = production, PR branch = preview URL)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d40a9acc7fa5b0bd9b53b5cd73f8f271
          command: pages deploy out --project-name=meshrahman-site --branch=${{ github.head_ref || github.ref_name }}
